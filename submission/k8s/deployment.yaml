# deployment.yaml — Video Processing Service Deployment
#
# TASK: Complete this deployment manifest for a production video processing service.
#
# Requirements:
#   - Resource requests and limits (CPU + memory)
#   - Liveness and readiness probes
#   - Security context (non-root, read-only root filesystem)
#   - Anti-affinity or topology spread constraints
#   - Image tag should NOT be :latest
#   - Reference the ConfigMap you create in configmap.yaml
#   - Environment variables for service configuration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-processor
  namespace: video-analytics
  labels:
    app: video-processor
spec:
  replicas: 3
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: video-processor
  template:
    metadata:
      labels:
        app: video-processor
    spec:
      containers:
      - name: video-processor
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/video-processor:v2.5
        ports:
        - containerPort: 8080
          name: http
        
        # pull configs from ConfigMap
        envFrom:
        - configMapRef:
            name: videoprocessor-config
        
        # Inject pod metadata into the container
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        
        # prevent child process from getting more privileges than parent
        # prevent writes to container file system
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3


      securityContext:
        # prevents the process from running as root; prevents escalated access in case of compromised pod
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001

      topologySpreadConstraints:
        # Defines constraint that at most one node can have one extra pod; if condition not met, pods not scheduled
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: video-processor