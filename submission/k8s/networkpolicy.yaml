# networkpolicy.yaml — Network Policy
#
# TASK: Create a NetworkPolicy for the video-processor pods.
#
# Requirements:
#   - Restrict ingress to only necessary sources
#   - Consider what services need to communicate with the video processor
#   - Default deny is a good starting point

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: video-processor
  namespace: video-analytics
spec:
  podSelector:
    matchLabels:
      app: video-processor
  policyTypes:
  - Ingress
  - Egress

  # Ingress: only allow in-namespace callers + optional Prometheus scraping
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: video-processor
    - podSelector:
        matchLabels:
          app: api-gateway
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8080

  # Egress: DNS + Kafka/MSK + HTTPS for AWS APIs (S3)
  # Note: NetworkPolicy cannot target AWS services by DNS name; we allow ports, and keep this service internal.
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Kafka/MSK (typical plaintext port; adjust if you use TLS/9094)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 9092

    # HTTPS for S3 (and other AWS APIs the app may call)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
